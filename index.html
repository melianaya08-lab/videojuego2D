<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoJuego 2D</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/img/favicon.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin: 0;
            overflow: hidden;
            cursor: url('assets/img/naveCursor.png') 8 8, auto;
        }

        canvas{
            display: block;
            width: 100vw;
            height: 80vh;
            background: url('assets/img/fondo.jpg') no-repeat center center;
            background-size: cover;
        }

        #score{
            position: absolute;
            top: 70px;
            right: 20px;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        #instructions{
            position: absolute;
            top: 70px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header class="bg-dark text-white text-center p-2">
    <h4> Aliens Cat</h4>
</header>

<div id="instructions">
    Haz clic en los gatitos <br>
    Se mueven en varias direcciones <br>
    Chocan entre sí
</div>

<div id="score">Eliminados: 0</div>

<main>
    <canvas id="canvas"></canvas>
</main>

<footer class="bg-dark text-white text-center p-2">
    Autor: <br>
    Cruz Perez Nelida Yareni - 23200906 <br>
    Villa Anaya Melina - 23200906 
</footer>

<!-- Música -->  
<audio src="assets/audio/audio.mp3" autoplay loop></audio>

<script src="game.js"></script>

</body>
</html>
